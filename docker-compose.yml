version: '3.8'

services:
  fruit-picking:
    build: .
    container_name: fruit-picking-app
    ports:
      - "3011:3011"
    environment:
      - PORT=3011
      - NODE_ENV=production
    volumes:
      - ./backend/data:/app/backend/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:3011/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
